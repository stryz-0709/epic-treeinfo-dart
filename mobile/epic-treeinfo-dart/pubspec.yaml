name: treeinfo_dart
description: "EarthRanger Tree Management – Flutter multiplatform app."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  provider: ^6.1.2

  # Networking
  http: ^1.4.0

  # Hashing / fingerprints
  crypto: ^3.0.6

  # Environment variables
  flutter_dotenv: ^5.2.1

  # Local storage
  shared_preferences: ^2.3.4

  # Image caching
  cached_network_image: ^3.4.1

  # Fullscreen image viewer
  photo_view: ^0.15.0

  # Smooth page indicator for carousel
  smooth_page_indicator: ^1.2.0+3

  # Map widget
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # URL launcher (open in system maps)
  url_launcher: ^6.3.1
  nfc_manager: ^4.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/icons/
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package
