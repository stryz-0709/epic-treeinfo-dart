name: Sync Trees to Google Sheet

on:
  # Run every hour at minute 0
  schedule:
    - cron: "0 * * * *"

  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write Google credentials file
        run: |
          echo '${{ secrets.GOOGLE_CREDENTIALS_JSON }}' > zalo/plate_detection_credentials.json

      - name: Run tree sync
        env:
          EARTHRANGER_DOMAIN: ${{ secrets.EARTHRANGER_DOMAIN }}
          EARTHRANGER_TOKEN: ${{ secrets.EARTHRANGER_TOKEN }}
        run: python tree_pipeline.py --once
